name: Fix ranking scroll once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-ranking-scroll-once.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore previous ranking navigation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/TripStatisticsView.tsx')
          text = path.read_text(encoding='utf-8')

          def sub_once(pattern: str, replacement: str, label: str, flags: int = 0) -> None:
              global text
              text, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')

          sub_once(
              r"\nconst RANKING_CLICK_SCROLL_PX = 32;\nconst RANKING_HOLD_SCROLL_PX = 18;\nconst RANKING_HOLD_DELAY_MS = 260;\nconst RANKING_HOLD_INTERVAL_MS = 90;\n",
              "",
              'ranking constants',
          )

          sub_once(
              r"  const rankingHoldRef = React\.useRef<\{ delayId: number \| null; intervalId: number \| null; didRepeat: boolean \}>\(\{\n(?:.|\n)*?  \}\);\n",
              "",
              'ranking hold ref',
          )

          sub_once(
              r"  const clearRankingHold = React\.useCallback\(\(\) => \{\n(?:.|\n)*?  \}, \[\]\);\n\n",
              "",
              'ranking hold cleanup',
          )

          sub_once(
              r"  React\.useEffect\(\(\) => clearRankingHold, \[clearRankingHold\]\);\n\n",
              "",
              'ranking hold effect',
          )

          sub_once(
              r"  const scrollRanking = React\.useCallback\(\([\s\S]*?(?=  const openExpandedMap)",
              """  const scrollRanking = React.useCallback((direction: -1 | 1) => {
              const el = rankingScrollRef.current;
              if (!el) return;

              el.scrollBy({
                left: direction * Math.max(72, el.clientWidth * 0.62),
                behavior: 'smooth',
              });
              window.setTimeout(updateRankingScrollState, 360);
            }, [updateRankingScrollState]);

          """,
              'ranking scroll function',
          )

          sub_once(
              r"  React\.useLayoutEffect\(\(\) => \{\n    if \(isActive\) return;\n    clearRankingHold\(\);\n    fullscreenMapRef\.current\?\.hidePopover\?\.\(\);\n    setIsExpandedMapOpen\(false\);\n  \}, \[clearRankingHold, isActive\]\);",
              """  React.useLayoutEffect(() => {
              if (isActive) return;
              fullscreenMapRef.current?.hidePopover?.();
              setIsExpandedMapOpen(false);
            }, [isActive]);""",
              'inactive cleanup',
          )

          sub_once(
              r"onClick=\{\(\) => clickRankingButton\(-1\)\}\n\s+onPointerDown=\{\(\) => startRankingHold\(-1\)\}\n\s+onPointerLeave=\{stopRankingHold\}\n\s+onPointerUp=\{stopRankingHold\}\n\s+onPointerCancel=\{stopRankingHold\}",
              "onClick={() => scrollRanking(-1)}",
              'left ranking button',
          )

          sub_once(
              r"onClick=\{\(\) => clickRankingButton\(1\)\}\n\s+onPointerDown=\{\(\) => startRankingHold\(1\)\}\n\s+onPointerLeave=\{stopRankingHold\}\n\s+onPointerUp=\{stopRankingHold\}\n\s+onPointerCancel=\{stopRankingHold\}",
              "onClick={() => scrollRanking(1)}",
              'right ranking button',
          )

          sub_once(
              r"items-end gap-1\.5 overflow-x-auto",
              "items-end gap-2 overflow-x-auto",
              'ranking gap',
          )
          sub_once(
              r'className="flex h-full w-\[15px\] shrink-0 flex-col items-center justify-end"',
              'className="flex h-full w-[22px] shrink-0 flex-col items-center justify-end"',
              'ranking item width',
          )
          sub_once(
              r'className="mb-1 text-\[10px\] font-bold text-\[#666\]"',
              'className="mb-1 text-[11px] font-bold text-[#666]"',
              'ranking value size',
          )
          sub_once(
              r'className="w-\[15px\] rounded-t-\[2px\]"',
              'className="w-[20px] rounded-t-[3px]"',
              'ranking bar width',
          )

          forbidden = ['rankingHoldRef', 'clearRankingHold', 'startRankingHold', 'stopRankingHold', 'clickRankingButton', 'RANKING_HOLD_']
          leftovers = [name for name in forbidden if name in text]
          if leftovers:
              raise SystemExit(f'Unexpected ranking hold code remains: {leftovers}')

          required = [
              "left: direction * Math.max(72, el.clientWidth * 0.62)",
              "onClick={() => scrollRanking(-1)}",
              "onClick={() => scrollRanking(1)}",
              "w-[22px] shrink-0",
              "w-[20px] rounded-t-[3px]",
          ]
          missing = [value for value in required if value not in text]
          if missing:
              raise SystemExit(f'Missing restored ranking code: {missing}')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/TripStatisticsView.tsx
          git commit -m "Fix ranking chart navigation"
          git push origin HEAD:main
