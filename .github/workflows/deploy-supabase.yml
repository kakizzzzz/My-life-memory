name: Deploy Supabase Backend

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend and Edge Functions
        run: |
          npm run lint
          npm run lint:edge
          npm test
          npm run build

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply pending migrations
        run: supabase db push --linked

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy register-with-invite --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy delete-account --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy memory-api --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy mcp-token --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy mcp --project-ref "$SUPABASE_PROJECT_REF"
