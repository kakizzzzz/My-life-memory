name: Ranking repair push once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch only the ranking chart
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/TripStatisticsView.tsx')
          text = path.read_text(encoding='utf-8')

          old_effect = '''  React.useEffect(() => {
            const el = rankingScrollRef.current;
            if (!el) return;

            el.scrollTo({ left: 0 });
            requestAnimationFrame(updateRankingScrollState);
          }, [textRankings, updateRankingScrollState]);'''

          new_effect = '''  React.useLayoutEffect(() => {
            const el = rankingScrollRef.current;
            if (!el || !isActive) return;

            el.scrollLeft = 0;
            const frame = requestAnimationFrame(() => {
              requestAnimationFrame(updateRankingScrollState);
            });

            return () => cancelAnimationFrame(frame);
          }, [isActive, textRankings, updateRankingScrollState]);'''

          if old_effect in text:
              text = text.replace(old_effect, new_effect, 1)
          elif new_effect not in text:
              raise SystemExit('ranking activation effect not found')

          old_chart_start = '''            <div
              ref={rankingScrollRef}
              onScroll={updateRankingScrollState}
              className={`flex h-full min-h-0 w-[226px] items-end gap-2 overflow-x-auto pb-0 pt-4 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden ${rankingScrollState.hasOverflow ? 'justify-start' : 'justify-center'}`}
            >'''

          new_chart_start = '''            <div
              ref={rankingScrollRef}
              onScroll={updateRankingScrollState}
              className="h-full min-h-0 w-[226px] overflow-x-auto pb-0 pt-4 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
            >
              <div className="flex h-full min-w-full w-max items-end justify-center gap-2">'''

          chart_end = '''              ))}
            </div>

            <button
              onClick={() => scrollRanking(1)}'''

          fixed_chart_end = '''              ))}
              </div>
            </div>

            <button
              onClick={() => scrollRanking(1)}'''

          if old_chart_start in text:
              text = text.replace(old_chart_start, new_chart_start, 1)
              if chart_end not in text:
                  raise SystemExit('ranking chart end not found')
              text = text.replace(chart_end, fixed_chart_end, 1)
          elif new_chart_start not in text:
              raise SystemExit('ranking chart container not found')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit repair and clean temporary files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/ranking-repair-push-once.yml
          rm -f .github/workflows/ranking-repair-final.yml
          rm -f .github/workflows/fix-ranking-initial-state-once.yml
          find . -maxdepth 1 -name '.ranking-*' -delete
          git add -A
          git commit -m "Fix ranking initial state"
          git push origin HEAD:main

# trigger final repair
