name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'fix/**'
      - 'codex/**'

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ranking-repair:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/ranking-overflow-final2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ranking branch
        uses: actions/checkout@v7
        with:
          ref: fix/ranking-overflow-final2
          fetch-depth: 0

      - name: Fix ranking overflow alignment
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/TripStatisticsView.tsx')
          text = path.read_text(encoding='utf-8')

          old_alignment = 'className="flex h-full min-w-full w-max items-end justify-center gap-2"'
          new_alignment = 'className="flex h-full min-w-full w-max items-end justify-start gap-2"'
          if text.count(old_alignment) != 1:
              raise SystemExit(f'expected one ranking alignment, found {text.count(old_alignment)}')
          text = text.replace(old_alignment, new_alignment, 1)

          old_effect = '''  React.useLayoutEffect(() => {
            const el = rankingScrollRef.current;
            if (!el || !isActive) return;

            el.scrollLeft = 0;
            const frame = requestAnimationFrame(() => {
              requestAnimationFrame(updateRankingScrollState);
            });

            return () => cancelAnimationFrame(frame);
          }, [isActive, textRankings, updateRankingScrollState]);'''

          new_effect = '''  React.useLayoutEffect(() => {
            const el = rankingScrollRef.current;
            if (!el || !isActive) return;

            const sync = () => {
              el.scrollLeft = 0;
              updateRankingScrollState();
            };

            sync();
            const firstFrame = requestAnimationFrame(() => {
              sync();
              requestAnimationFrame(sync);
            });
            const resizeObserver = new ResizeObserver(sync);
            resizeObserver.observe(el);
            if (el.firstElementChild) resizeObserver.observe(el.firstElementChild);

            return () => {
              cancelAnimationFrame(firstFrame);
              resizeObserver.disconnect();
            };
          }, [isActive, textRankings.length, updateRankingScrollState]);'''

          if text.count(old_effect) != 1:
              raise SystemExit(f'expected one ranking effect, found {text.count(old_effect)}')
          text = text.replace(old_effect, new_effect, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit ranking repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .ranking-overflow-trigger
          git add src/TripStatisticsView.tsx
          git commit -m "Fix ranking overflow alignment"
          git push origin HEAD:fix/ranking-overflow-final2

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Type check Edge Functions
        run: npm run lint:edge

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  mobile-webkit:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install WebKit browser
        run: npx playwright install --with-deps webkit

      - name: Mobile WebKit smoke test
        run: npm run test:e2e
