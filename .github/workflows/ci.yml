name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'fix/**'
      - 'codex/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Type check Edge Functions
        run: npm run lint:edge

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  mobile-webkit:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install WebKit browser
        run: npx playwright install --with-deps webkit

      - name: Mobile WebKit smoke test
        run: npm run test:e2e
