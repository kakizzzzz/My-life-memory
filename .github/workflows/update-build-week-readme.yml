name: Update Build Week README

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-build-week-readme.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update GPT-5.6 contribution statement
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = "GPT-5.6 supported product and architecture review, privacy and interaction analysis, test planning, and preparation of the competition demo materials. GPT-5.6 is not built into the web application; compatible AI clients can instead connect through the project's read-only MCP."
          new = "GPT-5.6 helped translate my product requirements into the technical architecture and assisted with configuring the Supabase backend, including the data model, Row Level Security policies, Edge Functions, privacy safeguards, testing strategy, and deployment workflow. It also supported product and interaction review and preparation of the competition demo materials. GPT-5.6 is not built into the web application; compatible AI clients can instead connect through the project's read-only MCP."

          if old not in text:
              raise SystemExit('Target paragraph not found; README was not changed.')

          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
          else
            git commit -m "docs: clarify GPT-5.6 contribution"
            git push
          fi
