name: Media Retention

on:
  schedule:
    - cron: '47 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: media-retention
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run server media retention
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          MEDIA_RETENTION_CRON_SECRET: ${{ secrets.MEDIA_RETENTION_CRON_SECRET }}
        run: |
          test -n "$SUPABASE_URL"
          test -n "$MEDIA_RETENTION_CRON_SECRET"
          curl --fail-with-body --silent --show-error \
            --retry 2 --retry-all-errors --max-time 180 \
            --request POST "$SUPABASE_URL/functions/v1/media-retention" \
            --header "Authorization: Bearer $MEDIA_RETENTION_CRON_SECRET" \
            --header "Content-Type: application/json" \
            --data '{}'
